name: Sync Notion meeting notes

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours, on the hour
  workflow_dispatch: {}     # allow manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: sync-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
          NOTION_TRANSACTION_PROPERTY: ${{ vars.NOTION_TRANSACTION_PROPERTY }}
          OUTPUT_PATH: data/notion-meetings.json
        run: python scripts/sync_notion.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notion-meetings.json
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "chore: sync Notion meeting notes [skip ci]"
            git push
          fi
